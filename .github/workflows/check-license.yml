name: CI
on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read # Needed to fetch code

jobs:
  check-license:
    name: Check license headers
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: check-license
        uses: apache/skywalking-eyes/header@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1 # v0.8.0
      - if: steps.check-license.outputs.result == 'failure'
        run: echo "Run 'license-eye header fix' to fix the license headers"
